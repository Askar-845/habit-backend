name: Build and Deploy to Azure Web App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  AZURE_WEBAPP_NAME: 'habit-backend-api'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Build with Maven (skip tests)
        run: mvn -B clean package -DskipTests

      - name: Resolve JAR path
        id: jar
        shell: bash
        run: |
          JAR_PATH=$(ls -1 target/*.jar | head -n 1)
          echo "jar=$JAR_PATH" >> $GITHUB_OUTPUT
          echo "Using JAR: $JAR_PATH"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_497635F098C9448A9AFA33275A567BD4 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F0D63D8AF40843589BC6DC931B9B3494 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8824723AFADB4BFFB97767A36E57B767 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ${{ steps.jar.outputs.jar }}
